; AI Builder configuration template. Copy to conf/aibuilder.ini and fill in the
; [token] secret, which MUST equal AIBUILDER_TOKEN_SECRET in both bridge env files
; (aibuilder-terminal and aibuilder-chat) so tokens minted here validate there.
; conf/aibuilder.ini is gitignored; this .example file is committed.

[token]
secret = change-me-to-a-long-random-string-shared-with-the-bridges
; session token lifetime (seconds)
ttl = 120

[bridge]
; Same-origin WebSocket paths (nginx proxies these to the bridges).
;   terminal: wss://<host>/aibuilder/ws       -> 127.0.0.1:3990 (node PTY bridge)
;   chat:     wss://<host>/aibuilder/chat-ws   -> 127.0.0.1:3991 (php ratchet bridge)
ws_path = /aibuilder/ws
chat_ws_path = /aibuilder/chat-ws

[access]
; Minimum role level allowed to REACH the AI Builder (lower = more privileged).
; 100 = MEMBER — members can use instances shared with their team; per-instance
; access is still enforced per endpoint. Provisioning (create) is ADMIN-only regardless.
min_level = 100

[ops]
; Directory holding the capricorn instance scripts (provision/snapshot/rollback).
bin_dir = /home/ubuntu/capricorn/bin
; Optional prefix if the fpm user needs elevation (e.g. "sudo -n ").
sudo_prefix =

[tools]
; Host path to the Mantic.sh MCP server (PHP AST analysis) wired into each
; workspace .mcp.json. Per-host — leave empty/absent to skip wiring mantic.
mantic_server =

[engine]
; Default coding agent for a freshly provisioned instance. Value is any registered
; [engine.*] name below. Resolution goes through lib/EngineRegistry (AGENT_ORCHESTRATION.md §7).
default = claude

[engine.claude]
transport = cli-headless
command = claude
cli_flavor = claude
headless_ready = true
planner_model = opus
worker_model = sonnet
auditor_model = sonnet
resolver_model = opus

[engine.qwen]
transport = cli-headless
command = qwen
cli_flavor = openai
openai_base_url = https://ollama.com/v1
openai_model = qwen3-coder:480b-cloud
; headless_ready = true   ; flip once jail-run.sh dispatches `qwen -p` (Phase A)
planner_model = opus
worker_model = qwen3-coder:480b-cloud
auditor_model = sonnet

[audit]
; Definition-of-Done QA pass after a plan completes: a jailed Playwright agent
; drives the live site as ROOT/ADMIN/MEMBER test users, screenshots the new
; interactions, posts results onto each subtask, reports failures to the firehose,
; and emails proof-of-life to the owner + shared teams. Set false to disable.
enabled = true
