; Mailgun Configuration
; Copy this file to mailgun.ini and fill in your credentials.
;
; Single source of truth for Mailgun — read by BOTH lib/Mailer and the comms
; subsystem (NotifyService + Webhook).

key="your-mailgun-api-key"
domain="mail.yourdomain.com"
fromEmail="noreply@yourdomain.com"
fromName="Your App Name"

; --- Optional (threaded comms subsystem) ---

; Inbound webhook HMAC verification. Get this from the Mailgun dashboard
; (Settings -> Webhooks / API security -> HTTP webhook signing key). If blank,
; the webhook accepts unverified posts and logs a dev-only warning.
signingKey=""

; Where reply-{token}@ addresses are Routed for inbound mail. Defaults to
; `domain` when blank. Point your Mailgun Receiving Route:
;   match_recipient("reply-.*@<inboundDomain>")  ->  https://<host>/webhook/mailgun
inboundDomain=""

; API region endpoint. Leave blank for US (default). EU domains MUST set this:
;   endpoint="https://api.eu.mailgun.net"
endpoint=""
