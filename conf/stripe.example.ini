; Stripe Connect app credentials for the control-plane connector.
;
; Copy this to conf/stripe.ini (gitignored, control-plane ONLY — it is never
; shipped to a builder instance) and fill in from your Stripe Connect settings.
;
; Register this redirect URI in the Stripe Connect application settings
; (Dashboard -> Settings -> Connect -> Onboarding options -> OAuth):
;   https://tiknix.com/connections/callback/stripe
;
; The per-ACCOUNT access token is obtained via OAuth and stored ENCRYPTED in the
; connections table on the control plane. It never lives in this file, and never
; in an instance — instances reach Stripe through the MCP broker.

[oauth]
client_id     = "ca_..."     ; Stripe Connect application client_id (from the platform's Connect settings)
client_secret = "sk_..."     ; the platform account secret key used for the token exchange
scope         = "read_write"

[webhook]
signing_secret = "whsec_..." ; reserved for the webhook phase — present but unused for now
