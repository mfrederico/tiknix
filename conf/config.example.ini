; TikNix Framework Configuration
; Copy this file to config.ini and update with your settings

[app]
name = "TikNix Application"
environment = "development" ; production, development, testing
debug = true
build_mode = true ; Enable to auto-create permissions (disable in production!)
session_name = "APP_SESSION"
session_lifetime = 86400 ; 24 hours
baseurl = "http://localhost:8000"
timezone = "UTC"
demo_mode = false ; ON: comms builds threads in-app and never calls Mailgun (offline demos/tests)
; Builder tooling (AI Builder, Workbench, Agent Setup) — control-plane-only.
; Leave unset on the root: it auto-detects by host (builds only on the apex,
; control_plane_host below / default <app>.com). Set false on a provisioned
; sub-instance to hard-disable the tools there regardless of host.
;builder_tools_enabled = false
;control_plane_host = "tiknix.com" ; apex host that counts as the control plane

[database]
type = "mysql" ; mysql, pgsql, sqlite
host = "localhost"
port = 3306
name = "tiknix"
user = "tiknix"
pass = "your_password_here"
charset = "utf8mb4"

[logging]
level = "DEBUG" ; DEBUG, INFO, WARNING, ERROR, CRITICAL
file = "log/app.log"
max_files = 30 ; Keep 30 days of logs

[mail]
enabled = false
driver = "smtp" ; smtp, mailgun, sendgrid
from_email = "noreply@example.com"
from_name = "My Application"

; SMTP Settings
smtp_host = "smtp.gmail.com"
smtp_port = 587
smtp_encryption = "tls" ; tls, ssl
smtp_username = ""
smtp_password = ""

; Mailgun / comms: credentials live in conf/mailgun.ini (key, domain, fromEmail,
; fromName, and optional signingKey, inboundDomain, endpoint) — shared by
; lib/Mailer and the comms subsystem. Not configured here.

[cors]
enabled = false
origin = "*"
methods = "GET, POST, PUT, DELETE, OPTIONS"
headers = "Content-Type, Authorization"
credentials = false

[security]
app_key = "" ; generate with: php -r "echo bin2hex(random_bytes(32));"
csrf_enabled = false ; Currently disabled for debugging, enable in production!
csrf_token_name = "csrf_token"
password_min_length = 6
password_require_special = false
password_require_numbers = false
password_require_uppercase = false
max_login_attempts = 5
lockout_duration = 900 ; 15 minutes in seconds

; Two-factor authentication (TOTP). Secure defaults: 2FA on and required for
; admins (level <= 50) and workbench users.
;   two_factor_enabled = false  -> disable 2FA entirely (dev convenience)
;   two_factor_enforce = false  -> OPTIONAL: eligible users are prompted at
;                                  login but may "Skip for now"; opted-in users
;                                  still verify. Users can enable it any time.
two_factor_enabled = true
two_factor_enforce = true

[uploads]
enabled = true
max_size = 5242880 ; 5MB in bytes
upload_path = "uploads/"
allowed_types = "image/jpeg,image/png,image/gif,application/pdf"
create_thumbnails = false
thumbnail_width = 200
thumbnail_height = 200

[cache]
enabled = false
driver = "file" ; file, redis, memcached
ttl = 3600 ; 1 hour
path = "cache/"

; Redis Settings
redis_host = "127.0.0.1"
redis_port = 6379
redis_password = ""
redis_database = 0

[api]
enabled = false
rate_limit = true
rate_limit_requests = 100
rate_limit_window = 3600 ; 1 hour
require_auth = true
api_key_header = "X-API-Key"

[social]
; Google OAuth 2.0 Settings
; Create credentials at: https://console.cloud.google.com/apis/credentials
; Add authorized redirect URI: https://yourapp.com/auth/googlecallback
google_client_id = ""
google_client_secret = ""
google_redirect_uri = "http://localhost:8000/auth/googlecallback"

; Facebook OAuth Settings (not yet implemented)
facebook_app_id = ""
facebook_app_secret = ""
facebook_redirect_uri = ""

; GitHub OAuth Settings (not yet implemented)
github_client_id = ""
github_client_secret = ""
github_redirect_uri = ""

[features]
; Feature flags
registration_enabled = true
email_verification = false
two_factor_auth = false
remember_me = true
social_login = false
api_access = false
file_uploads = true

[maintenance]
enabled = false
message = "We are currently performing maintenance. Please check back soon."
allowed_ips = "127.0.0.1" ; Comma-separated list of IPs that can access during maintenance

; Firehose: ship uncaught errors to the control plane, which dedups by signature
; and (for a NEW error on a published, idle instance) auto-triages a fix workspace.
; Populated per instance at provision time. Leave ingest_url empty to disable.
[firehose]
report = true                 ; master switch for this instance
role = "live"                 ; "live" reports; task workspaces are stamped "workspace" (muted)
ingest_url = ""               ; e.g. https://tiknix.com/firehose/report — empty = off
api_key = ""                  ; shared secret the ingest endpoint validates
instance = ""                 ; instance tag, e.g. "bidsurge.tiknix" (else derived from baseurl)
[explorer]
; Architecture Explorer sidecar SSO. sso_secret must be identical in both the
; core config and the explorer.tiknix sidecar config. Leave url empty to disable
; the launch link. Generate a secret with: openssl rand -hex 32
sso_secret =
url =
