; AI Builder configuration template. Copy to conf/aibuilder.ini and fill in the
; [token] secret, which MUST equal AIBUILDER_TOKEN_SECRET in both bridge env files
; (aibuilder-terminal and aibuilder-chat) so tokens minted here validate there.
; conf/aibuilder.ini is gitignored; this .example file is committed.

[token]
secret = change-me-to-a-long-random-string-shared-with-the-bridges
; session token lifetime (seconds)
ttl = 120

[bridge]
; Same-origin WebSocket paths (nginx proxies these to the bridges).
;   terminal: wss://<host>/aibuilder/ws       -> 127.0.0.1:3990 (node PTY bridge)
;   chat:     wss://<host>/aibuilder/chat-ws   -> 127.0.0.1:3991 (php ratchet bridge)
ws_path = /aibuilder/ws
chat_ws_path = /aibuilder/chat-ws

[access]
; Minimum role level allowed to use the AI Builder (lower = more privileged). 50 = ADMIN.
min_level = 50

[ops]
; Directory holding the capricorn instance scripts (provision/snapshot/rollback).
bin_dir = /home/ubuntu/capricorn/bin
; Optional prefix if the fpm user needs elevation (e.g. "sudo -n ").
sudo_prefix =

[engine]
; Default coding agent for a freshly provisioned instance: claude | qwen
default = claude

[engine.qwen]
openai_base_url = https://ollama.com/v1
openai_model = qwen3-coder:480b-cloud
