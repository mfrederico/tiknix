; Instagram (Meta) connector — control-plane OAuth credentials.
;
; Create ONE Meta app you own (developers.facebook.com) and add the "Instagram" product
; configured for the "Instagram API with Instagram Login" path. In the app's OAuth
; settings add this exact redirect URI:
;
;   https://<your-host>/connections/callback/instagram
;
; Your own / a tester account works in DEV MODE with zero App Review. Serving arbitrary
; clients requires Advanced Access on instagram_business_basic + Meta Business
; Verification (weeks). The connected account must be a Professional (Business/Creator)
; Instagram account — personal accounts have no API access since Dec 2024.
;
; Copy this file to conf/instagram.ini and fill in the values (conf/instagram.ini is
; gitignored like the other connector secrets).

[oauth]
client_id     = "YOUR_META_APP_ID"
client_secret = "YOUR_META_APP_SECRET"
scopes        = "instagram_business_basic"
