; GitHub OAuth App credentials for AI Builder "Connect with GitHub".
; Register an app at: https://github.com/settings/applications/new
;   Homepage URL:               https://<your-host>/
;   Authorization callback URL: https://<your-host>/connections/callback/github
; Copy this file to conf/github.ini and fill in the values. Leave blank to
; disable OAuth (the personal-access-token flow still works either way).
[oauth]
client_id = ""
client_secret = ""
scope = "repo read:user"
