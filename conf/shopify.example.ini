; Shopify app credentials for the control-plane connector.
;
; Copy this to conf/shopify.ini (gitignored, control-plane ONLY — it is never
; shipped to a builder instance) and fill in from your Shopify Partner app.
;
; The per-STORE access token is obtained via OAuth and stored ENCRYPTED in the
; connections table on the control plane. It never lives in this file, and never
; in an instance — instances reach Shopify through the MCP broker.

[oauth]
client_id     = ""
client_secret = ""

; Comma-separated Shopify Admin API scopes. Least-privilege default (read-only);
; add write_* scopes only when a connector feature needs them.
scopes        = "read_products,read_orders,read_customers"

; Pinned Admin API version.
api_version   = "2024-10"
